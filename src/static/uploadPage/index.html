<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка видео</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style_upload.css">
</head>
<body>

<div class="container">
    <div class="upload-card">
        <div class="card-header">
            <h2>Загрузить видео</h2>
            <p>MP4, AVI, MKV (Макс. 500MB)</p>
        </div>

        <!-- Шаг 1: Выбор файла -->
        <div class="drop-zone" id="dropZone">
            <div class="icon-container">
                <i class="fa-solid fa-cloud-arrow-up"></i>
            </div>
            <span class="drop-text">Перетащите видео сюда или</span>
            <button class="browse-btn" onclick="document.getElementById('videoInput').click()">Выбрать файл</button>
            <input type="file" id="videoInput" accept="video/*" hidden>
        </div>

        <!-- Шаг 2: Детали (Название и кнопка) - скрыто сначала -->
        <div class="details-step" id="detailsStep" style="display: none;">

            <!-- Информация о файле -->
            <div class="file-summary">
                <div class="file-icon">
                    <i class="fa-solid fa-film"></i>
                </div>
                <div class="file-details">
                    <span id="fileName" class="name">video.mp4</span>
                    <span id="fileSize" class="size">0 MB</span>
                </div>
                <button class="remove-btn" id="removeFileBtn" title="Удалить">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Поле ввода названия -->
            <div class="input-group">
                <label for="videoTitle">Название видео</label>
                <input type="text" id="videoTitle" placeholder="Введите красивое название...">
            </div>

            <!-- Кнопка загрузки -->
            <button class="upload-btn" id="startUploadBtn">
                <i class="fa-solid fa-upload"></i> Загрузить на сервер
            </button>
        </div>

        <!-- Прогресс бар -->
        <div class="progress-container" id="progressContainer" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <!-- Статус -->
        <div class="status-message" id="status"></div>
    </div>
</div>

<script src="script_upload.js"></script>
</body>
</html>
